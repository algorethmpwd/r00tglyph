version: '3.8'

services:
  # Main R00tGlyph Application
  rootglyph:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rootglyph-web
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-rootglyph_production_secret_change_me}
      - DATABASE_URL=sqlite:///instance/r00tglyph.db
      - MAX_CONTENT_LENGTH=16777216
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data:rw
      - ./instance:/app/instance:rw
      - ./backup:/app/backup:rw
      - ./static/uploads:/app/static/uploads:rw
    networks:
      - rootglyph-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # PostgreSQL Database (Production)
  postgres:
    image: postgres:15-alpine
    container_name: rootglyph-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=rootglyph
      - POSTGRES_USER=rootglyph
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rootglyph_secure_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rootglyph-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rootglyph -d rootglyph"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - production

  # Redis Cache (Production)
  redis:
    image: redis:7-alpine
    container_name: rootglyph-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rootglyph-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    profiles:
      - production

  # Adminer - Database Management (Development)
  adminer:
    image: adminer:latest
    container_name: rootglyph-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - rootglyph-network
    profiles:
      - development

  # MailHog - Email Testing (Development)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: rootglyph-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - rootglyph-network
    profiles:
      - development

networks:
  rootglyph-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
